name: CI / Release Binaries

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            platform: linux
            artifact: molspin-linux-x64.tar.gz
          - name: macOS arm64
            runner: macos-15
            platform: macos
            artifact: molspin-macos-arm64.tar.gz
          - name: Windows x64
            runner: windows-2025
            platform: windows
            triplet: x64-windows-clangcl
            artifact: molspin-windows-x64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache vcpkg binary packages
        if: matrix.platform == 'windows'
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.vcpkg-cache
          key: windows-vcpkg-binaries-${{ matrix.triplet }}-${{ hashFiles('vcpkg-triplets/*.cmake', '.github/workflows/c-cpp.yml') }}
          restore-keys: |
            windows-vcpkg-binaries-${{ matrix.triplet }}-

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libarmadillo-dev libopenblas-dev liblapack-dev

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew update
          brew install cmake ninja armadillo openblas libomp

      - name: Install Windows dependencies with vcpkg
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $overlay = Join-Path (Get-Location) "vcpkg-triplets"
          $vcpkgRoot = Join-Path $env:GITHUB_WORKSPACE "vcpkg"
          $binaryCache = Join-Path $env:GITHUB_WORKSPACE ".vcpkg-cache"
          New-Item -ItemType Directory -Force -Path $binaryCache | Out-Null
          if (-not (Test-Path (Join-Path $vcpkgRoot "vcpkg.exe"))) {
            git clone --depth 1 https://github.com/microsoft/vcpkg $vcpkgRoot
          }
          & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          $env:VCPKG_DEFAULT_BINARY_CACHE = $binaryCache
          & (Join-Path $vcpkgRoot "vcpkg.exe") install armadillo openblas --triplet "${{ matrix.triplet }}" --overlay-triplets "$overlay"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_DEFAULT_BINARY_CACHE=$binaryCache" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure on Linux
        if: matrix.platform == 'linux'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMOLSPIN_ENABLE_NATIVE_OPTIMIZATIONS=OFF

      - name: Configure on macOS
        if: matrix.platform == 'macos'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix);$(brew --prefix openblas);$(brew --prefix libomp)" \
            -DMOLSPIN_ENABLE_NATIVE_OPTIMIZATIONS=OFF

      - name: Configure on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $overlay = Join-Path (Get-Location) "vcpkg-triplets"
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl `
            -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" `
            -DVCPKG_OVERLAY_TRIPLETS="$overlay" `
            -DMOLSPIN_ENABLE_NATIVE_OPTIMIZATIONS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        id: tests
        continue-on-error: true
        run: ctest --test-dir build --output-on-failure --parallel

      - name: Package Unix artifact
        if: matrix.platform != 'windows'
        run: |
          mkdir -p package
          cp "$(find build -type f -name molspin | head -n 1)" package/molspin
          cp README.md package/README.md
          tar -czf "${{ matrix.artifact }}" -C package .

      - name: Package Windows artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          $exe = "build/molspin.exe"
          if (-not (Test-Path $exe)) {
            throw "molspin.exe not found at $exe."
          }
          Copy-Item $exe package/molspin.exe
          Copy-Item README.md package/README.md
          Compress-Archive -Path package/* -DestinationPath "${{ matrix.artifact }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload artifact to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}" --clobber

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: |
          echo "Tests failed. Build artifacts were still packaged and uploaded."
          exit 1
