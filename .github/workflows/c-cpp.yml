name: CI / Release Binaries

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            platform: linux
            artifact: molspin-linux-x64.tar.gz
          - name: macOS arm64
            runner: macos-15
            platform: macos
            artifact: molspin-macos-arm64.tar.gz
          - name: Windows x64
            runner: windows-2025
            platform: windows
            triplet: x64-windows
            artifact: molspin-windows-x64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libarmadillo-dev libopenblas-dev liblapack-dev

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew update
          brew install cmake ninja armadillo openblas libomp

      - name: Install Windows dependencies with vcpkg
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $overlay = Join-Path (Get-Location) "vcpkg-triplets"
          git clone https://github.com/microsoft/vcpkg "$env:RUNNER_TEMP/vcpkg"
          & "$env:RUNNER_TEMP/vcpkg/bootstrap-vcpkg.bat"
          & "$env:RUNNER_TEMP/vcpkg/vcpkg.exe" install armadillo openblas --triplet "${{ matrix.triplet }}" --overlay-triplets "$overlay"
          "VCPKG_ROOT=$env:RUNNER_TEMP/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure on Linux
        if: matrix.platform == 'linux'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMOLSPIN_ENABLE_NATIVE_OPTIMIZATIONS=OFF

      - name: Configure on macOS
        if: matrix.platform == 'macos'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix);$(brew --prefix openblas);$(brew --prefix libomp)" \
            -DMOLSPIN_ENABLE_NATIVE_OPTIMIZATIONS=OFF

      - name: Configure on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $overlay = Join-Path (Get-Location) "vcpkg-triplets"
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="${{ matrix.triplet }}" `
            -DVCPKG_OVERLAY_TRIPLETS="$overlay" `
            -DMOLSPIN_ENABLE_NATIVE_OPTIMIZATIONS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Package Unix artifact
        if: matrix.platform != 'windows'
        run: |
          mkdir -p package
          cp "$(find build -type f -name molspin | head -n 1)" package/molspin
          cp README.md package/README.md
          tar -czf "${{ matrix.artifact }}" -C package .

      - name: Package Windows artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          $exe = "build/molspin.exe"
          if (-not (Test-Path $exe)) {
            throw "molspin.exe not found at $exe."
          }
          Copy-Item $exe package/molspin.exe
          Copy-Item README.md package/README.md
          Compress-Archive -Path package/* -DestinationPath "${{ matrix.artifact }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload artifact to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.artifact }}" --clobber
